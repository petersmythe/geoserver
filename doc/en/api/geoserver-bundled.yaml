openapi: 3.0.0
info:
  title: GeoServer Unified API
  version: 3.0.x
  description: "Complete OpenAPI 3.0 specification for GeoServer REST API and OGC services.\n\nThis unified specification provides comprehensive documentation for:\n- REST Configuration API for managing workspaces, layers, styles, and services\n- OGC Web Services including WMS, WFS, WCS, WMTS, CSW, and WPS\n\nGeoServer is an open source server for sharing geospatial data. It publishes data from \nmajor spatial data sources using open standards.\n"
  contact:
    name: GeoServer Project
    url: https://geoserver.org
    email: geoserver-user@discourse.osgeo.org
  license:
    name: GPL 2.0
    url: https://www.gnu.org/licenses/gpl-2.0.html
  termsOfService: https://geoserver.org/
externalDocs:
  description: GeoServer Documentation
  url: https://docs.geoserver.org/
servers:
- url: http://localhost:8080/geoserver
  description: Local development server
- url: https://example.com/geoserver
  description: Production server (replace with your GeoServer URL)
tags:
- name: REST
  description: Core REST API endpoints for server management and configuration
- name: REST Extensions
  description: REST API endpoints from extension modules
- name: REST Community
  description: REST API endpoints from community modules
- name: REST GWC
  description: REST API endpoints for GeoWebCache tile caching
- name: REST Security
  description: REST API endpoints for security and authentication management
- name: WMS 1.3.0
  description: Web Map Service - OGC standard for rendering maps (version 1.3.0)
  externalDocs:
