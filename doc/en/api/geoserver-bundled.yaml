          type: string
      - name: format
        in: path
        required: true
        description: Response format
        schema:
          type: string
          enum:
          - xml
          - json
    post:
      tags:
      - REST GWC
      summary: Seed or truncate tiles
      description: 'Issues a seed, reseed, or truncate task for the specified layer.


        **Task types**:

        - seed: Add tiles to cache

        - reseed: Replace existing tiles

        - truncate: Remove tiles from cache

        '
      operationId: postGwcSeed
      security:
      - basicAuth: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              xml:
                name: seedRequest
              properties:
                name:
                  type: string
                bounds:
                  type: object
                  properties:
                    coords:
                      type: object
                      properties:
                        double:
                          type: array
                          items:
                            type: number
                gridSetId:
                  type: string
                zoomStart:
                  type: integer
                zoomStop:
                  type: integer
                format:
                  type: string
                type:
                  type: string
                  enum:
                  - seed
                  - reseed
                  - truncate
                threadCount:
                  type: integer
                parameters:
                  type: object
                  additionalProperties:
                    type: string
          application/json:
            schema:
              type: object
              properties:
                seedRequest:
                  type: object
      responses:
        '200':
          description: Seed/truncate task submitted successfully
      parameters:
      - name: layer
        in: path
        required: true
        description: Name of the tile layer
        schema:
          type: string
      - name: format
        in: path
        required: true
        description: Response format
        schema:
          type: string
          enum:
          - xml
          - json
