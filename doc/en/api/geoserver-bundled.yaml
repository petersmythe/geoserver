          default: DescribeRecord
      - name: TYPENAME
        in: query
        description: Record type names
        required: false
        schema:
          type: string
      - name: OUTPUTFORMAT
        in: query
        description: Output format
        required: false
        schema:
          type: string
          default: application/xml
      - name: SCHEMALANGUAGE
        in: query
        description: Schema language
        required: false
        schema:
          type: string
          default: http://www.w3.org/XML/Schema
      responses:
        '200':
          description: Successful operation
          content:
            application/xml:
              schema:
                type: string
                format: binary
        default:
          description: Error response
          content:
            application/xml:
              schema:
                type: object
                description: OGC Service Exception
