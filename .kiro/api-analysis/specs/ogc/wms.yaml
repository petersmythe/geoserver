  /wms/getmap/1-0-0:
    get:
      operationId: WMS_1_0_0_GetMap
      summary: GetMap - WMS 1.0.0
      description: 'Returns a map image for specified layers and area


        **Vendor Extension Parameters**: CQL_FILTER, FEATUREID, TILED, TILESORIGIN,
        BUFFER, PALETTE, FEATUREVERSION, MAXFEATURES, STARTINDEX, ANGLE, SORTBY, SCALEMETHOD,
        CLIP, FORMAT_OPTIONS, ENV, VIEWPARAMS, INTERPOLATIONS, REMOTE_OWS_TYPE, REMOTE_OWS_URL'
      tags:
      - WMS
      parameters:
      - name: VERSION
        in: query
        description: Service version
        required: true
        schema:
          type: string
      - name: REQUEST
        in: query
        description: Operation name
        required: true
        schema:
          type: string
          default: GetMap
      - name: LAYERS
        in: query
        description: Comma-separated list of layer names
        required: true
        schema:
          type: string
      - name: STYLES
        in: query
        description: Comma-separated list of style names (empty for default)
        required: true
        schema:
          type: string
      - name: SRS
        in: query
        description: Spatial Reference System (WMS 1.1.x) or CRS (WMS 1.3.0)
        required: true
        schema:
          type: string
      - name: BBOX
        in: query
        description: Bounding box (minx,miny,maxx,maxy)
        required: true
        schema:
          type: string
      - name: WIDTH
        in: query
        description: Image width in pixels
        required: true
        schema:
          type: integer
      - name: HEIGHT
        in: query
        description: Image height in pixels
        required: true
        schema:
          type: integer
      - name: FORMAT
        in: query
        description: Output image MIME type (e.g., image/png, image/jpeg)
        required: true
        schema:
          type: string
      - name: TRANSPARENT
        in: query
        description: Background transparency
        required: false
        schema:
          type: boolean
          default: 'false'
      - name: BGCOLOR
        in: query
        description: 'Background color (hex format: 0xRRGGBB)'
        required: false
        schema:
          type: string
          default: '0xFFFFFF'
      - name: EXCEPTIONS
        in: query
        description: Exception format
        required: false
        schema:
          type: string
          default: application/vnd.ogc.se_xml
      - name: TIME
        in: query
        description: Time dimension value or range
        required: false
        schema:
          type: string
      - name: ELEVATION
        in: query
        description: Elevation dimension value or range
        required: false
        schema:
          type: string
      - name: SLD
        in: query
        description: URL to external SLD document (alias for STYLE_URL)
        required: false
        schema:
          type: string
      - name: SLD_BODY
        in: query
        description: Inline SLD document (alias for STYLE_BODY)
        required: false
        schema:
          type: string
      - name: STYLE_URL
        in: query
        description: URL to external style document
        required: false
        schema:
          type: string
      - name: STYLE_BODY
        in: query
        description: Inline style document
        required: false
        schema:
          type: string
      - name: STYLE_VERSION
        in: query
        description: Style language version
        required: false
        schema:
          type: string
      - name: STYLE_FORMAT
        in: query
        description: Style document format
        required: false
        schema:
          type: string
      - name: VALIDATESCHEMA
        in: query
        description: Validate SLD schema
        required: false
        schema:
          type: boolean
          default: 'false'
      - name: FILTER
        in: query
        description: OGC Filter XML for each layer
        required: false
        schema:
          type: string
      - name: CQL_FILTER
        in: query
        description: CQL filter expressions for each layer
        required: false
        schema:
          type: string
      - name: FEATUREID
        in: query
        description: Feature IDs to render
        required: false
        schema:
          type: string
      - name: TILED
        in: query
        description: WMS-C tiling hint
        required: false
        schema:
          type: boolean
          default: 'false'
      - name: TILESORIGIN
        in: query
        description: Tile origin point (x,y)
        required: false
        schema:
          type: string
      - name: BUFFER
        in: query
        description: Rendering buffer in pixels
        required: false
        schema:
          type: integer
          default: '0'
      - name: PALETTE
        in: query
        description: Color palette for indexed color images
        required: false
        schema:
          type: string
      - name: FEATUREVERSION
        in: query
        description: Feature version for versioned layers
        required: false
        schema:
          type: string
      - name: REMOTE_OWS_TYPE
        in: query
        description: Remote OWS service type
        required: false
        schema:
          type: string
      - name: REMOTE_OWS_URL
        in: query
        description: Remote OWS service URL
        required: false
        schema:
          type: string
      - name: MAXFEATURES
        in: query
        description: Maximum features to render (vector layers)
        required: false
        schema:
          type: integer
      - name: STARTINDEX
        in: query
        description: Start index for feature paging (vector layers)
        required: false
        schema:
          type: integer
      - name: ANGLE
        in: query
        description: Map rotation angle in degrees
        required: false
        schema:
          type: number
          default: '0'
      - name: SORTBY
        in: query
        description: Sort order for features
        required: false
        schema:
          type: string
      - name: SCALEMETHOD
        in: query
        description: Scale computation method (OGC or Accurate)
        required: false
        schema:
          type: string
          default: OGC
      - name: CLIP
        in: query
        description: Polygon WKT to clip output
        required: false
        schema:
          type: string
      - name: FORMAT_OPTIONS
        in: query
        description: Format-specific options (key:value pairs)
        required: false
        schema:
          type: string
      - name: ENV
        in: query
        description: SLD environment variables for substitution
        required: false
        schema:
          type: string
      - name: VIEWPARAMS
        in: query
