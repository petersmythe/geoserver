        required: false
        schema:
          type: string
      - name: INTERPOLATIONS
        in: query
        description: Interpolation methods for raster layers
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/xml:
              schema:
                type: string
                format: binary
        default:
          description: Error response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/OGCException'
