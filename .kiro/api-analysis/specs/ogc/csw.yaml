openapi: 3.0.0
info:
  title: GeoServer Catalog Service for the Web API
  description: 'OGC Catalog Service for metadata discovery


    Supported versions: 2.0.2'
  version: 2.0.2
  contact:
    name: GeoServer Project
    url: https://geoserver.org
  license:
    name: GPL 2.0
    url: https://www.gnu.org/licenses/gpl-2.0.html
servers:
- url: http://localhost:8080/geoserver
  description: Local GeoServer instance
- url: https://example.com/geoserver
  description: Production GeoServer instance
tags:
- name: CSW
  description: Catalog Service for the Web
  externalDocs:
    description: OGC CSW Specification
    url: https://www.ogc.org/standards/csw
paths:
  /csw:
    description: CSW service endpoint. Operations are distinguished by the REQUEST
      parameter.
  /csw/getcapabilities/2-0-2:
