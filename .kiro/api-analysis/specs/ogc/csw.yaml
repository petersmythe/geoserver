      operationId: CSW_2_0_2_GetCapabilities
      summary: GetCapabilities - CSW 2.0.2
      description: Returns service metadata
      tags:
      - CSW
      parameters:
      - name: SERVICE
        in: query
        description: Service name (CSW)
        required: true
        schema:
          type: string
      - name: VERSION
        in: query
        description: Service version
        required: false
        schema:
          type: string
          default: 2.0.2
      - name: REQUEST
        in: query
        description: Operation name
        required: true
