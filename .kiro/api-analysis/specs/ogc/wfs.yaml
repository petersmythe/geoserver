openapi: 3.0.0
info:
  title: GeoServer Web Feature Service API
  description: 'OGC Web Feature Service for vector data access and editing


    Supported versions: 1.0.0, 1.1.0, 2.0.0'
  version: 2.0.0
  contact:
    name: GeoServer Project
    url: https://geoserver.org
  license:
    name: GPL 2.0
    url: https://www.gnu.org/licenses/gpl-2.0.html
servers:
- url: http://localhost:8080/geoserver
  description: Local GeoServer instance
- url: https://example.com/geoserver
  description: Production GeoServer instance
tags:
- name: WFS
  description: Web Feature Service
  externalDocs:
    description: OGC WFS Specification
    url: https://www.ogc.org/standards/wfs
paths:
  /wfs:
    description: WFS service endpoint. Operations are distinguished by the REQUEST
      parameter.
  /wfs/getcapabilities/1-0-0:
    get:
      operationId: WFS_1_0_0_GetCapabilities
      summary: GetCapabilities - WFS 1.0.0
      description: Returns service metadata and available feature types
      tags:
      - WFS
      parameters:
      - name: SERVICE
        in: query
        description: Service name (WFS)
        required: true
        schema:
          type: string
          default: WFS
      - name: VERSION
        in: query
        description: Service version (use ACCEPTVERSIONS in 2.0)
        required: false
        schema:
          type: string
          enum: &id001
          - 1.0.0
          - 1.1.0
          - 2.0.0
      - name: REQUEST
        in: query
        description: Operation name
        required: true
        schema:
          type: string
          default: GetCapabilities
      - name: ACCEPTFORMATS
        in: query
        description: Comma-separated list of accepted output formats
        required: false
        schema:
          type: string
          default: text/xml
      - name: UPDATESEQUENCE
        in: query
        description: Sequence number for cache validation
        required: false
        schema:
          type: string
      - name: NAMESPACE
        in: query
        description: Filter feature types by namespace (vendor extension)
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/xml:
              schema:
                type: string
                format: binary
        default:
          description: Error response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/OGCException'
    post:
      operationId: WFS_1_0_0_GetCapabilities_wfs
      summary: GetCapabilities - WFS 1.0.0
      description: Returns service metadata and available feature types
      tags:
      - WFS
      parameters:
      - name: SERVICE
        in: query
        description: Service name (WFS)
        required: true
        schema:
          type: string
          default: WFS
      - name: VERSION
        in: query
        description: Service version (use ACCEPTVERSIONS in 2.0)
        required: false
        schema:
          type: string
          enum: *id001
      - name: REQUEST
