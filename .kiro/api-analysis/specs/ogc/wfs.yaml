  /wfs/getfeature/1-0-0:
    get:
      operationId: WFS_1_0_0_GetFeature
      summary: GetFeature - WFS 1.0.0
      description: 'Returns feature instances matching the query


        **Vendor Extension Parameters**: CQL_FILTER, FEATUREVERSION, VIEWPARAMS, FORMAT_OPTIONS'
      tags:
      - WFS
      parameters:
      - name: SERVICE
        in: query
        description: Service name (WFS)
        required: true
        schema:
          type: string
          default: WFS
      - name: VERSION
        in: query
        description: Service version
        required: true
        schema:
          type: string
          enum: &id003
          - 1.0.0
          - 1.1.0
          - 2.0.0
      - name: REQUEST
        in: query
        description: Operation name
        required: true
        schema:
          type: string
          default: GetFeature
      - name: TYPENAME
        in: query
        description: Comma-separated list of feature type names (WFS 1.x)
        required: true
        schema:
          type: string
      - name: OUTPUTFORMAT
        in: query
        description: Output format MIME type
        required: false
        schema:
          type: string
          default: text/xml; subtype=gml/3.1.1
      - name: RESULTTYPE
        in: query
        description: Results or hits
        required: false
        schema:
          type: string
          default: results
          enum: &id004
          - results
          - hits
      - name: PROPERTYNAME
        in: query
        description: Comma-separated list of properties to return
        required: false
        schema:
          type: string
      - name: FEATUREID
        in: query
        description: Comma-separated list of feature IDs
        required: false
        schema:
          type: string
      - name: FILTER
        in: query
        description: OGC Filter XML
        required: false
        schema:
          type: string
      - name: BBOX
        in: query
        description: Bounding box filter (minx,miny,maxx,maxy[,crs])
        required: false
        schema:
          type: string
      - name: MAXFEATURES
        in: query
        description: Maximum features to return (WFS 1.x)
        required: false
        schema:
          type: integer
      - name: SORTBY
        in: query
        description: Sort order (property[+A|-D])
        required: false
        schema:
          type: string
      - name: SRSNAME
        in: query
        description: Coordinate reference system for output
        required: false
        schema:
          type: string
      - name: EXCEPTIONS
        in: query
        description: Exception format
        required: false
        schema:
          type: string
          default: text/xml
      - name: CQL_FILTER
        in: query
        description: CQL filter expression (vendor extension)
        required: false
        schema:
          type: string
      - name: FEATUREVERSION
        in: query
        description: Feature version for versioned layers (vendor extension)
        required: false
        schema:
          type: string
      - name: VIEWPARAMS
        in: query
        description: SQL view parameters (vendor extension)
        required: false
        schema:
          type: string
      - name: FORMAT_OPTIONS
        in: query
        description: Format-specific options (vendor extension)
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/xml:
              schema:
                type: string
                format: binary
        default:
          description: Error response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/OGCException'
