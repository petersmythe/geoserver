openapi: 3.0.0
info:
  title: GeoServer Web Coverage Service API
  description: 'OGC Web Coverage Service for raster data access


    Supported versions: 1.0.0, 1.1.0, 1.1.1, 2.0.0, 2.0.1'
  version: 2.0.1
  contact:
    name: GeoServer Project
    url: https://geoserver.org
  license:
    name: GPL 2.0
    url: https://www.gnu.org/licenses/gpl-2.0.html
servers:
- url: http://localhost:8080/geoserver
  description: Local GeoServer instance
- url: https://example.com/geoserver
  description: Production GeoServer instance
tags:
- name: WCS
  description: Web Coverage Service
  externalDocs:
    description: OGC WCS Specification
    url: https://www.ogc.org/standards/wcs
paths:
  /wcs:
    description: WCS service endpoint. Operations are distinguished by the REQUEST
      parameter.
  /wcs/getcapabilities/1-0-0:
    get:
      operationId: WCS_1_0_0_GetCapabilities
      summary: GetCapabilities - WCS 1.0.0
      description: Returns service metadata and available coverages
      tags:
      - WCS
      parameters:
      - name: SERVICE
        in: query
        description: Service name (WCS)
        required: true
        schema:
          type: string
      - name: VERSION
        in: query
        description: Service version
        required: false
        schema:
          type: string
      - name: REQUEST
        in: query
        description: Operation name
        required: true
        schema:
          type: string
          default: GetCapabilities
      - name: SECTIONS
        in: query
        description: Sections to include
        required: false
        schema:
          type: string
      - name: UPDATESEQUENCE
        in: query
        description: Cache validation
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/xml:
              schema:
                type: string
                format: binary
        default:
          description: Error response
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/OGCException'
